<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prototype</title><style>body{font-family:Arial;margin:20px;max-width:1000px;margin:auto} .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}.lang button{padding:8px 12px;margin-left:4px}.active{background:#222;color:#fff}.filters{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin:20px 0}input,select{padding:8px}.card{border:1px solid #ccc;border-radius:8px;padding:12px;margin:10px 0}.tag{display:inline-block;background:#eee;padding:3px 8px;border-radius:20px;margin:2px;font-size:12px}@media(max-width:700px){.filters{grid-template-columns:1fr}}</style></head><body><div class="top"><div><h1 id=tit>Baza potencjalnych promotorów</h1><p id=sub>Wyszukaj promotora.</p></div><div class=lang><button id=pl class=active onclick="langSet('pl')">🇵🇱 Polski</button><button id=en onclick="langSet('en')">🇬🇧 English</button></div></div><div class=filters><input id=q placeholder="Szukaj..."><select id=d><option value="">Wszystkie dyscypliny</option><option>Językoznawstwo</option><option>Literaturoznawstwo</option></select><select id=u><option value="">Wszystkie jednostki</option><option>Wydział Anglistyki</option><option>Instytut Filologii Stosowanej</option></select></div><div id=cnt></div><div id=res></div><script>
let L="pl";
const txt={pl:{t:"Baza potencjalnych promotorów",s:"Wyszukaj promotora.",c:"Liczba wyników",pl:"Sylwetka PL",en:"Sylwetka EN"},en:{t:"Potential supervisors",s:"Search supervisors.",c:"Results",pl:"Profile PL",en:"Profile EN"}};
const data=[{n:"Paulina Ambroży",d:"Literaturoznawstwo",u:"Wydział Anglistyki",e:"apaulina@amu.edu.pl",k:["ekokrytyka","nature writing"],pl:"#",en:""},{n:"Katarzyna Dziubalska-Kołaczyk",d:"Językoznawstwo",u:"Wydział Anglistyki",e:"dkasia@amu.edu.pl",k:["fonologia","fonetyka"],pl:"#",en:"#"}];
function langSet(x){L=x;pl.className=x=="pl"?"active":"";en.className=x=="en"?"active":"";tit.innerText=txt[x].t;sub.innerText=txt[x].s;draw();}
function draw(){let r=data.filter(p=>(!q.value||JSON.stringify(p).toLowerCase().includes(q.value.toLowerCase()))&&(!d.value||p.d==d.value)&&(!u.value||p.u==u.value));cnt.innerText=txt[L].c+": "+r.length;res.innerHTML=r.map(p=>`<div class=card><h3>${p.n}</h3><b>${p.d}</b><br>${p.u}<p>${p.k.map(x=>`<span class=tag>${x}</span>`).join("")}</p><a href="mailto:${p.e}">${p.e}</a> ${p.pl?`| <a href="${p.pl}" target=_blank>${txt[L].pl}</a>`:""} ${p.en?`| <a href="${p.en}" target=_blank>${txt[L].en}</a>`:""}</div>`).join("");}
q.oninput=draw;d.onchange=draw;u.onchange=draw;draw();
</script></body></html>
