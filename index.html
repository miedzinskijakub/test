<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wyszukiwarka promotorów</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --uam-blue:#003b78;
  --uam-light:#eaf1fb;
  --uam-border:#006eb6;
  --text:#10233f;
  --muted:#5d6b7a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:#fff;
}
.supervisor-search{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
  display:block;
  width:100%;
}
.search-header{
  display:block;
  margin-bottom:18px;
}
.search-title-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}
.search-header h2{
  margin:0 0 8px;
  font-family:Georgia,"Times New Roman",serif;
  font-size:30px;
  color:#111;
}
.search-header p{
  margin:0;
  color:var(--muted);
  line-height:1.5;
  max-width:760px;
}
.lang{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  flex-shrink:0;
}
.lang button,.more-btn{
  border:1px solid var(--uam-blue);
  background:white;
  color:var(--uam-blue);
  padding:9px 16px;
  cursor:pointer;
  font-weight:bold;
}
.lang button.active,.more-btn:hover{
  background:var(--uam-blue);
  color:white;
}
.search-panel{
  display:block;
  width:100%;
  border-top:6px solid var(--uam-border);
  background:var(--uam-light);
  padding:24px;
  margin:20px 0 24px;
}
.filters{
  display:grid;
  grid-template-columns:minmax(240px,2fr) minmax(150px,1fr) minmax(180px,1fr) minmax(150px,1fr);
  gap:16px;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:7px;
}
input,select{
  width:100%;
  padding:12px;
  border:1px solid #b5c3d4;
  font-size:15px;
  background:white;
}
.count{
  margin:18px 0;
  font-weight:bold;
}
.notice{
  background:#fff8d8;
  border:1px solid #e2c75b;
  padding:14px;
  margin:14px 0;
}
#results{
  display:block;
  width:100%;
}
.card{
  display:block;
  width:100%;
  border-top:5px solid var(--uam-border);
  background:var(--uam-light);
  padding:22px;
  margin-bottom:18px;
}
.card h3{
  margin:0 0 10px;
  font-family:Georgia,"Times New Roman",serif;
  font-size:24px;
}
.meta{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:14px;
}
.tag{
  display:inline-block;
  border:1px solid #b5c3d4;
  background:white;
  padding:5px 10px;
  margin:4px 5px 4px 0;
  font-size:14px;
}
.links{
  margin-top:16px;
}
.links a{
  color:var(--uam-blue);
  font-weight:bold;
  text-decoration:none;
  margin-right:18px;
  display:inline-block;
  margin-top:6px;
}
.links a:hover{text-decoration:underline}
.center{text-align:center;margin:24px 0}
@media(max-width:900px){
  .search-title-row{display:block}
  .lang{justify-content:flex-start;margin-top:14px}
  .search-header h2{font-size:26px}
  .filters{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="supervisor-search">
  <div class="search-header">
    <div class="search-title-row">
      <div>
        <h2 id="title">Wyszukiwarka promotorów</h2>
        <p id="subtitle">Wyszukaj promotora po nazwisku, dyscyplinie, jednostce lub obszarze badawczym.</p>
      </div>

      <div class="lang">
        <button id="plBtn" class="active" onclick="setLang('pl')">Polski</button>
        <button id="enBtn" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>

  <section class="search-panel">
    <div class="filters">
      <div>
        <label id="searchLabel">Szukaj</label>
        <input id="search" placeholder="np. fonetyka, arabski, Szekspir">
      </div>

      <div>
        <label id="discLabel">Dyscyplina</label>
        <select id="discipline"></select>
      </div>

      <div>
        <label id="unitLabel">Jednostka</label>
        <select id="unit"></select>
      </div>

      <div>
        <label id="profileLabel">Sylwetka</label>
        <select id="profileFilter">
          <option value="">Wszystkie</option>
          <option value="hasProfile">Tylko z sylwetką</option>
          <option value="pl">Sylwetka PL</option>
          <option value="en">Sylwetka EN</option>
        </select>
      </div>
    </div>
  </section>

  <div id="loading" class="notice">Ładowanie danych z arkusza...</div>
  <div id="count" class="count"></div>
  <div id="results"></div>
  <div id="moreBox" class="center"></div>
</div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1oVB9E0bPJmFyJ1YXhzJH6wyNPV9j6vUhJ6CIjIFxSKE/gviz/tq?tqx=out:csv&sheet=Arkusz2";

const SITE_URL =
  "https://test-pi-plum-24.vercel.app";

let lang = "pl";
let data = [];
let visibleLimit = 20;

function profileUrl(filename, language) {
  const file = cleanValue(filename);

  if (!file) return "";

  if (/^https?:\/\//i.test(file)) {
    return file;
  }

  const folder = language === "en" ? "en" : "pl";

  return `${SITE_URL}/profiles/${folder}/${encodeURIComponent(file)}`;
}

const txt = {
  pl: {
    title: "Wyszukiwarka promotorów",
    subtitle: "Wyszukaj promotora po nazwisku, dyscyplinie, jednostce lub obszarze badawczym.",
    search: "Szukaj",
    disc: "Dyscyplina",
    unit: "Jednostka",
    profile: "Sylwetka",
    all: "Wszystkie",
    onlyProfiles: "Tylko z sylwetką",
    profilePLFilter: "Sylwetka PL",
    profileENFilter: "Sylwetka EN",
    count: "Liczba wyników",
    shown: "pokazano",
    more: "Pokaż więcej",
    profilePL: "Sylwetka PL",
    profileEN: "Sylwetka EN",
    noResults: "Brak wyników dla podanych kryteriów.",
    loading: "Ładowanie danych z arkusza...",
    error: "Nie udało się pobrać danych. Sprawdź, czy arkusz jest udostępniony/opublikowany."
  },
  en: {
    title: "Supervisor search",
    subtitle: "Search for a supervisor by name, discipline, unit or research area.",
    search: "Search",
    disc: "Discipline",
    unit: "Unit",
    profile: "Profile",
    all: "All",
    onlyProfiles: "Only with profile",
    profilePLFilter: "Profile PL",
    profileENFilter: "Profile EN",
    count: "Results",
    shown: "shown",
    more: "Show more",
    profilePL: "Profile PL",
    profileEN: "Profile EN",
    noResults: "No results for the selected criteria.",
    loading: "Loading data from the sheet...",
    error: "Could not load data. Check whether the sheet is shared/published."
  }
};

function setLang(l) {
  lang = l;
  visibleLimit = 20;

  document.getElementById("plBtn").classList.toggle("active", l === "pl");
  document.getElementById("enBtn").classList.toggle("active", l === "en");

  document.getElementById("title").innerText = txt[l].title;
  document.getElementById("subtitle").innerText = txt[l].subtitle;
  document.getElementById("searchLabel").innerText = txt[l].search;
  document.getElementById("discLabel").innerText = txt[l].disc;
  document.getElementById("unitLabel").innerText = txt[l].unit;
  document.getElementById("profileLabel").innerText = txt[l].profile;

  const profileFilter = document.getElementById("profileFilter");
  profileFilter.options[0].text = txt[l].all;
  profileFilter.options[1].text = txt[l].onlyProfiles;
  profileFilter.options[2].text = txt[l].profilePLFilter;
  profileFilter.options[3].text = txt[l].profileENFilter;

  fillFilters();
  render();
}

function normalize(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\\u0300-\\u036f]/g, "");
}

function cleanValue(value) {
  const v = String(value || "").trim();
  if (v === "#VALUE!" || v === "#N/A" || v === "undefined" || v === "null") return "";
  return v;
}

function getCell(row, names) {
  for (const name of names) {
    if (row[name] !== undefined) return cleanValue(row[name]);
  }
  return "";
}

function splitValues(value) {
  return cleanValue(value)
    .split(";")
    .map(x => x.trim())
    .filter(Boolean);
}

function currentDiscipline(person) {
  return lang === "en" && person.disciplineEN
    ? person.disciplineEN
    : person.disciplinePL;
}

function currentUnit(person) {
  return lang === "en" && person.unitEN
    ? person.unitEN
    : person.unitPL;
}

function currentKeywords(person) {
  return lang === "en" && person.keywordsEN.length
    ? person.keywordsEN
    : person.keywordsPL;
}

async function loadData() {
  try {
    document.getElementById("loading").style.display = "block";
    document.getElementById("loading").innerText = txt[lang].loading;

    const response = await fetch(SHEET_URL);
    const csv = await response.text();

    const parsed = Papa.parse(csv, {
      header: true,
      skipEmptyLines: true
    });

    data = parsed.data
      .map(row => {
        const researchPL = getCell(row, ["research_PL"]);
        const researchEN = getCell(row, ["research_EN"]);
        const active = getCell(row, ["Aktywny", "active"]);

        return {
          name: getCell(row, ["name", "Nazwisko/ Imię", "Nazwisko/Imię"]),
          disciplinePL: getCell(row, ["discipline_PL"]),
          disciplineEN: getCell(row, ["discipline_EN"]),
          unitPL: getCell(row, ["unit_PL"]),
          unitEN: getCell(row, ["unit_EN"]),
          researchPL,
          researchEN,
          keywordsPL: splitValues(researchPL),
          keywordsEN: splitValues(researchEN),
          email: getCell(row, ["Adres e-mail", "email", "Email"]),
          active,
          profilePL: profileUrl(
  getCell(row, ["sylwetka_PL", "profile_PL", "profile_pl"]),
  "pl"
),

profileEN: profileUrl(
  getCell(row, ["sylwetka_EN", "profile_EN", "profile_en"]),
  "en"
)
        };
      })
      .filter(p => {
        const active = normalize(p.active);
        return p.name && active !== "nie" && active !== "no" && active !== "false";
      });

    document.getElementById("loading").style.display = "none";
    fillFilters();
    render();

  } catch (error) {
    document.getElementById("loading").innerText = txt[lang].error;
    console.error(error);
  }
}

function fillFilters() {
  const disciplineSelect = document.getElementById("discipline");
  const unitSelect = document.getElementById("unit");

  const currentD = disciplineSelect.value;
  const currentU = unitSelect.value;

  disciplineSelect.innerHTML = `<option value="">${txt[lang].all}</option>`;
  unitSelect.innerHTML = `<option value="">${txt[lang].all}</option>`;

  [...new Set(data.map(p => currentDiscipline(p)).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b, lang === "pl" ? "pl" : "en"))
    .forEach(value => {
      disciplineSelect.innerHTML += `<option value="${value}">${value}</option>`;
    });

  [...new Set(data.map(p => currentUnit(p)).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b, lang === "pl" ? "pl" : "en"))
    .forEach(value => {
      unitSelect.innerHTML += `<option value="${value}">${value}</option>`;
    });

  if ([...disciplineSelect.options].some(o => o.value === currentD)) {
    disciplineSelect.value = currentD;
  }

  if ([...unitSelect.options].some(o => o.value === currentU)) {
    unitSelect.value = currentU;
  }
}

function render() {
  const query = normalize(document.getElementById("search").value);
  const selectedDiscipline = document.getElementById("discipline").value;
  const selectedUnit = document.getElementById("unit").value;
  const profileFilter = document.getElementById("profileFilter").value;

  const filtered = data.filter(p => {
    const discipline = currentDiscipline(p);
    const unit = currentUnit(p);

    const haystack = normalize([
      p.name,
      p.email,
      p.disciplinePL,
      p.disciplineEN,
      p.unitPL,
      p.unitEN,
      p.researchPL,
      p.researchEN
    ].join(" "));

    const hasPL = Boolean(p.profilePL);
    const hasEN = Boolean(p.profileEN);

    let matchesProfile = true;
    if (profileFilter === "hasProfile") matchesProfile = hasPL || hasEN;
    if (profileFilter === "pl") matchesProfile = hasPL;
    if (profileFilter === "en") matchesProfile = hasEN;

    return (
      (!query || haystack.includes(query)) &&
      (!selectedDiscipline || discipline === selectedDiscipline) &&
      (!selectedUnit || unit === selectedUnit) &&
      matchesProfile
    );
  });

  const limited = filtered.slice(0, visibleLimit);

  document.getElementById("count").innerText =
    `${txt[lang].count}: ${filtered.length}` +
    (filtered.length > visibleLimit ? ` — ${txt[lang].shown}: ${visibleLimit}` : "");

  if (!limited.length) {
    document.getElementById("results").innerHTML =
      `<div class="notice">${txt[lang].noResults}</div>`;
    document.getElementById("moreBox").innerHTML = "";
    return;
  }

  document.getElementById("results").innerHTML = limited.map(p => `
    <article class="card">
      <h3>${p.name}</h3>

      <div class="meta">
        <strong>${currentDiscipline(p)}</strong><br>
        ${currentUnit(p)}
      </div>

      <div>
        ${currentKeywords(p).map(k => `<span class="tag">${k}</span>`).join("")}
      </div>

      <div class="links">
        ${p.email ? `<a href="mailto:${p.email}">${p.email}</a>` : ""}
        ${p.profilePL ? `<a href="${p.profilePL}" target="_blank" rel="noopener">${txt[lang].profilePL}</a>` : ""}
        ${p.profileEN ? `<a href="${p.profileEN}" target="_blank" rel="noopener">${txt[lang].profileEN}</a>` : ""}
      </div>
    </article>
  `).join("");

  document.getElementById("moreBox").innerHTML =
    filtered.length > visibleLimit
      ? `<button class="more-btn" onclick="showMore()">${txt[lang].more}</button>`
      : "";
}

function showMore() {
  visibleLimit += 20;
  render();
}

document.getElementById("search").addEventListener("input", () => {
  visibleLimit = 20;
  render();
});

document.getElementById("discipline").addEventListener("change", () => {
  visibleLimit = 20;
  render();
});

document.getElementById("unit").addEventListener("change", () => {
  visibleLimit = 20;
  render();
});

document.getElementById("profileFilter").addEventListener("change", () => {
  visibleLimit = 20;
  render();
});

loadData();
</script>
</body>
</html>
