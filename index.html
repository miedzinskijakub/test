<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baza potencjalnych promotorów</title>
  <style>
    :root {
      --border: #d6d6d6;
      --bg: #f7f7f7;
      --text: #222;
      --muted: #666;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background: white;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 28px;
    }

    .lead {
      margin-top: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 8px;
      margin: 22px 0;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #222;
      color: white;
      border: 1px solid #222;
    }

    button.secondary {
      background: white;
      color: #222;
      margin-top: 8px;
    }

    .summary {
      margin-bottom: 14px;
      color: var(--muted);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: white;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .keywords {
      margin: 10px 0;
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      margin: 3px 4px 3px 0;
      font-size: 13px;
    }

    .links {
      margin-top: 12px;
    }

    .links a, .email {
      display: inline-block;
      margin-right: 12px;
      margin-top: 6px;
      color: #0645ad;
      text-decoration: none;
      font-weight: bold;
    }

    .links a:hover, .email:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }

    @media (max-width: 800px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Baza potencjalnych promotorów</h1>
    <p class="lead">
      Wyszukaj promotora po nazwisku, słowie kluczowym, dyscyplinie albo jednostce.
      Przy wybranych osobach dostępne są sylwetki w formacie PDF.
    </p>

    <section class="filters" aria-label="Filtry wyszukiwania">
      <div>
        <label for="search">Słowo kluczowe / nazwisko</label>
        <input id="search" type="search" placeholder="np. Szekspir, fonetyka, arabski..." />
      </div>

      <div>
        <label for="discipline">Dyscyplina</label>
        <select id="discipline">
          <option value="">Wszystkie</option>
        </select>
      </div>

      <div>
        <label for="unit">Jednostka</label>
        <select id="unit">
          <option value="">Wszystkie</option>
        </select>
      </div>

      <div>
        <button onclick="applyFilters()">Szukaj</button>
        <button class="secondary" onclick="resetFilters()">Wyczyść</button>
      </div>
    </section>

    <div id="summary" class="summary"></div>
    <section id="results" class="results"></section>
  </main>

  <script>
    const people = [
      {
        name: "Katarzyna Dziubalska-Kołaczyk",
        discipline: "Językoznawstwo",
        unit: "Wydział Anglistyki",
        email: "dkasia@amu.edu.pl",
        keywords: [
          "fonologia",
          "fonetyka",
          "akwizycja języka",
          "przetwarzanie mowy",
          "języki zagrożone"
        ],
        profilePL: "pdf/dziubalska-kolaczyk-pl.pdf",
        profileEN: "pdf/dziubalska-kolaczyk-en.pdf"
      },
      {
        name: "Paulina Ambroży",
        discipline: "Literaturoznawstwo",
        unit: "Wydział Anglistyki",
        email: "apaulina@amu.edu.pl",
        keywords: [
          "amerykańska poezja modernistyczna",
          "współczesna poezja amerykańska",
          "ekokrytyka",
          "nature writing",
          "badania intermedialne"
        ],
        profilePL: "pdf/ambrozy-paulina-pl.pdf",
        profileEN: ""
      },
      {
        name: "Marcin Michalski",
        discipline: "Językoznawstwo",
        unit: "Instytut Filologii Stosowanej",
        email: "marcin.michalski@amu.edu.pl",
        keywords: [
          "język arabski",
          "morfologia języka arabskiego",
          "składnia języka arabskiego",
          "dialekty arabskie"
        ],
        profilePL: "",
        profileEN: "pdf/michalski-marcin-en.pdf"
      },
      {
        name: "Katarzyna Burzyńska",
        discipline: "Literaturoznawstwo",
        unit: "Wydział Anglistyki",
        email: "kasia86@amu.edu.pl",
        keywords: [
          "Szekspir",
          "dramat angielski",
          "adaptacje",
          "gender studies",
          "studia queerowe"
        ],
        profilePL: "pdf/burzynska-katarzyna-pl.pdf",
        profileEN: "pdf/burzynska-katarzyna-en.pdf"
      },
      {
        name: "Agnieszka Chmiel",
        discipline: "Językoznawstwo",
        unit: "Wydział Anglistyki",
        email: "achmiel@amu.edu.pl",
        keywords: [
          "przekładoznawstwo",
          "tłumaczenie konferencyjne",
          "przekład audiowizualny",
          "technologie w tłumaczeniu ustnym"
        ],
        profilePL: "",
        profileEN: ""
      }
    ];

    const searchInput = document.getElementById("search");
    const disciplineSelect = document.getElementById("discipline");
    const unitSelect = document.getElementById("unit");
    const resultsEl = document.getElementById("results");
    const summaryEl = document.getElementById("summary");

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function fillSelect(select, values) {
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function initFilters() {
      const disciplines = [...new Set(people.map(p => p.discipline))].sort();
      const units = [...new Set(people.map(p => p.unit))].sort();

      fillSelect(disciplineSelect, disciplines);
      fillSelect(unitSelect, units);
    }

    function applyFilters() {
      const query = normalize(searchInput.value);
      const discipline = disciplineSelect.value;
      const unit = unitSelect.value;

      const filtered = people.filter(person => {
        const searchable = normalize([
          person.name,
          person.discipline,
          person.unit,
          person.email,
          ...person.keywords
        ].join(" "));

        const matchesQuery = !query || searchable.includes(query);
        const matchesDiscipline = !discipline || person.discipline === discipline;
        const matchesUnit = !unit || person.unit === unit;

        return matchesQuery && matchesDiscipline && matchesUnit;
      });

      renderResults(filtered);
    }

    function resetFilters() {
      searchInput.value = "";
      disciplineSelect.value = "";
      unitSelect.value = "";
      renderResults(people);
    }

    function renderResults(list) {
      summaryEl.textContent = `Liczba wyników: ${list.length}`;

      if (!list.length) {
        resultsEl.innerHTML = `<div class="empty">Brak wyników dla podanych kryteriów.</div>`;
        return;
      }

      resultsEl.innerHTML = list.map(person => `
        <article class="card">
          <h2>${person.name}</h2>
          <div class="meta">
            <strong>${person.discipline}</strong><br />
            ${person.unit}
          </div>

          <div class="keywords">
            ${person.keywords.map(keyword => `<span class="tag">${keyword}</span>`).join("")}
          </div>

          <div class="links">
            <a class="email" href="mailto:${person.email}">${person.email}</a>
            ${person.profilePL ? `<a href="${person.profilePL}" target="_blank" rel="noopener">Sylwetka PL</a>` : ""}
            ${person.profileEN ? `<a href="${person.profileEN}" target="_blank" rel="noopener">Sylwetka EN</a>` : ""}
          </div>
        </article>
      `).join("");
    }

    searchInput.addEventListener("input", applyFilters);
    disciplineSelect.addEventListener("change", applyFilters);
    unitSelect.addEventListener("change", applyFilters);

    initFilters();
    renderResults(people);
  </script>
</body>
</html>
